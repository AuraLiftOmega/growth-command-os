name: Mirror to ecosystem repos

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to masterecosystem
        run: |
          git remote add mirror-eco https://x-access-token:${{ secrets.MIRROR_PAT }}@github.com/rfloweroflife-ui/masterecosystem.git
          git push mirror-eco main --force

      - name: Push to growth-command-os
        run: |
          git remote add mirror-gco https://x-access-token:${{ secrets.MIRROR_PAT }}@github.com/rfloweroflife-ui/growth-command-os.git
          git push mirror-gco main --force
